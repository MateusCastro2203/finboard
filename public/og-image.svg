<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0D0D10"/>
      <stop offset="100%" stop-color="#111116"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8912A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C8912A" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8912A" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#C8912A" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="barC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8912A"/>
      <stop offset="100%" stop-color="#C8912A" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle horizontal grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1E1E24" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1E1E24" stroke-width="1"/>

  <!-- Right-side bar chart -->
  <rect x="730" y="352" width="56" height="230" rx="5" fill="url(#barA)"/>
  <rect x="806" y="272" width="56" height="310" rx="5" fill="url(#barB)"/>
  <rect x="882" y="182" width="56" height="400" rx="5" fill="url(#barC)"/>
  <rect x="958" y="242" width="56" height="340" rx="5" fill="url(#barB)"/>
  <rect x="1034" y="152" width="56" height="430" rx="5" fill="url(#barC)"/>
  <rect x="1110" y="212" width="56" height="370" rx="5" fill="url(#barB)"/>

  <!-- Left gold accent bar -->
  <rect x="80" y="148" width="4" height="334" rx="2" fill="#C8912A" opacity="0.25"/>
  <rect x="80" y="148" width="4" height="80"  rx="2" fill="#C8912A"/>

  <!-- Brand name (small, top) -->
  <text x="104" y="185" font-family="Georgia,'Times New Roman',serif" font-size="28" font-weight="400" letter-spacing="4" fill="#C8912A">FinBoard</text>

  <!-- Main headline -->
  <text x="104" y="278" font-family="Georgia,'Times New Roman',serif" font-size="58" font-weight="400" fill="#EDE8DF" letter-spacing="-1">Entenda se sua empresa</text>
  <text x="104" y="346" font-family="Georgia,'Times New Roman',serif" font-size="58" font-weight="400" fill="#EDE8DF" letter-spacing="-1">está lucrando de verdade</text>

  <!-- Subtext -->
  <text x="104" y="402" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="300" fill="#7A7672" letter-spacing="0.3">DRE · Fluxo de Caixa · Análise de Margem · Relatórios automáticos</text>

  <!-- Divider -->
  <rect x="104" y="432" width="520" height="1" fill="#2A2A30"/>

  <!-- CTA button -->
  <rect x="104" y="456" width="268" height="52" rx="5" fill="#C8912A"/>
  <text x="238" y="488" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#0A0A0C" letter-spacing="0.3">Experimente grátis →</text>

  <!-- URL next to CTA -->
  <text x="392" y="488" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" fill="#42403C" letter-spacing="0.5">finboard.app.br</text>
</svg>
